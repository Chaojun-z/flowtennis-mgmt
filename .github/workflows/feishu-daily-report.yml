name: Feishu Daily Report

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: production
      ALLOW_PRODUCTION_BOOTSTRAP_WRITES: 'false'
      TS_ENDPOINT: ${{ secrets.TABLESTORE_READONLY_ENDPOINT }}
      TS_INSTANCE: ${{ secrets.TABLESTORE_READONLY_INSTANCE }}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.TABLESTORE_READONLY_ACCESS_KEY_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.TABLESTORE_READONLY_ACCESS_KEY_SECRET }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_DAILY_REPORT_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            standalone-services/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install standalone service dependencies
        run: npm ci
        working-directory: standalone-services

      - name: Prepare production env file
        run: |
          cat > .env.production <<EOF
          APP_ENV=production
          TS_ENDPOINT=${TS_ENDPOINT}
          TS_INSTANCE=${TS_INSTANCE}
          ALIBABA_CLOUD_ACCESS_KEY_ID=${ALIBABA_CLOUD_ACCESS_KEY_ID}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
          ALLOW_PRODUCTION_BOOTSTRAP_WRITES=false
          EOF

      - name: Export daily report snapshot
        run: node scripts/export-schedule-report-json.js

      - name: Send Feishu daily report
        run: node feishu-report.js
        working-directory: standalone-services
