name: Feishu Monitor Daily Summary

on:
  schedule:
    - cron: '23 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  actions: read

jobs:
  send-monitor-daily-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Shanghai
      FEISHU_MONITOR_WEBHOOK_URL: ${{ secrets.FEISHU_MONITOR_ALERT_WEBHOOK }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: standalone-services/package-lock.json

      - name: Install standalone service dependencies
        run: npm ci
        working-directory: standalone-services

      - name: Send Feishu monitor daily summary
        run: node feishu-monitor-daily-summary.js
        working-directory: standalone-services
